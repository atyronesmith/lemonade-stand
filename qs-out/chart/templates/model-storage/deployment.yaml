# Generated by quickpat compose -- do not edit
{{- if eq .Values.modelStorage.provider "minio" }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: model-storage
  labels:
    app: model-storage
spec:
  replicas: 1
  selector:
    matchLabels:
      app: model-storage
  template:
    metadata:
      labels:
        app: model-storage
    spec:
      initContainers:
        - name: download-models
          image: quay.io/rgeada/llm_downloader:latest
          env:
            - name: MODELS_PATH
              value: /mnt/models/huggingface
            - name: MODEL_IDS
              value: 'ibm-granite/granite-guardian-hap-125m,protectai/deberta-v3-base-prompt-injection-v2'
          volumeMounts:
            - name: model-pvc
              mountPath: /mnt/models
        - name: bucket-init
          image: quay.io/minio/mc:latest
          command: [sh, -c]
          args:
            - |
              until mc alias set local http://localhost:9000 $MINIO_ROOT_USER $MINIO_ROOT_PASSWORD; do
                echo "Waiting for MinIO..."; sleep 2
              done
              mc mb local/{{ .Values.modelStorage.bucket }} --ignore-existing
              echo "Bucket ready."
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: model-storage-credentials
                  key: AWS_ACCESS_KEY_ID
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: model-storage-credentials
                  key: AWS_SECRET_ACCESS_KEY
      containers:
        - name: minio
          image: {{ .Values.modelStorage.image }}
          args:
            - server
            - /models
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: model-storage-credentials
                  key: AWS_ACCESS_KEY_ID
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: model-storage-credentials
                  key: AWS_SECRET_ACCESS_KEY
          ports:
            - containerPort: 9000
          volumeMounts:
            - name: model-pvc
              mountPath: /models
      volumes:
        - name: model-pvc
          persistentVolumeClaim:
            claimName: model-storage-pvc
{{- end }}
