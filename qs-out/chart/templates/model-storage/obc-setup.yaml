{{- if eq .Values.modelStorage.provider "odf" }}
# This Job reads the OBC-generated Secret and ConfigMap and writes a
# RHOAI-formatted data-connection Secret. It runs once after install
# and is removed on success by Helm's hook-delete-policy.
apiVersion: batch/v1
kind: Job
metadata:
  name: model-storage-setup
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-delete-policy: hook-succeeded
    helm.sh/hook-weight: "5"
spec:
  template:
    spec:
      serviceAccountName: model-storage-setup-sa
      restartPolicy: OnFailure
      containers:
        - name: setup
          image: quay.io/openshift/origin-cli:latest
          command: [sh, -c]
          args:
            - |
              set -e
              OBC_NAME=model-storage-obc
              # Wait for OBC to be bound
              until oc get secret $OBC_NAME 2>/dev/null; do
                echo "Waiting for OBC Secret..."; sleep 3
              done
              HOST=$(oc get configmap $OBC_NAME -o jsonpath='{{.data.BUCKET_HOST}}')
              PORT=$(oc get configmap $OBC_NAME -o jsonpath='{{.data.BUCKET_PORT}}')
              BUCKET=$(oc get configmap $OBC_NAME -o jsonpath='{{.data.BUCKET_NAME}}')
              ACCESS=$(oc get secret $OBC_NAME -o jsonpath='{{.data.AWS_ACCESS_KEY_ID}}' | base64 -d)
              SECRET=$(oc get secret $OBC_NAME -o jsonpath='{{.data.AWS_SECRET_ACCESS_KEY}}' | base64 -d)
              oc create secret generic model-storage-data-connection \
                --from-literal=AWS_S3_ENDPOINT="http://$HOST:$PORT" \
                --from-literal=AWS_S3_BUCKET="$BUCKET" \
                --from-literal=AWS_DEFAULT_REGION=us-east-1 \
                --from-literal=AWS_ACCESS_KEY_ID="$ACCESS" \
                --from-literal=AWS_SECRET_ACCESS_KEY="$SECRET" \
                --dry-run=client -o yaml | oc apply -f -
              oc label secret model-storage-data-connection \
                opendatahub.io/dashboard=true opendatahub.io/managed=true \
                --overwrite
              oc annotate secret model-storage-data-connection \
                opendatahub.io/connection-type=s3 --overwrite
              echo "Data connection created."
{{- end }}
