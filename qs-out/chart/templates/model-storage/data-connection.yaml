{{- if eq .Values.modelStorage.provider "minio" }}
{{- if .Values.secrets.modelStorageAccessKey }}
apiVersion: v1
kind: Secret
metadata:
  name: model-storage-data-connection
  labels:
    opendatahub.io/dashboard: "true"
    opendatahub.io/managed: "true"
  annotations:
    opendatahub.io/connection-type: s3
type: Opaque
stringData:
  AWS_ACCESS_KEY_ID: {{ .Values.secrets.modelStorageAccessKey | quote }}
