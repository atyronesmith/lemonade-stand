# Generated by quickpat compose -- do not edit
# Override any value with: helm install <name> ./chart --set key=value

# ── Secrets ──────────────────────────────────────────────────────────
# Fill these in before helm install, or use scripts/create-secrets.sh
secrets:
  llmVllmApiKey: ""
  modelStorageAccessKey: ""
  modelStorageSecretKey: ""

# ── llm (model-serving) ──
llm:
  model: meta-llama/Llama-3.2-3B-Instruct
  image: quay.io/modh/vllm:rhoai-2.19-cuda
  storageUri: oci://quay.io/redhat-ai-services/modelcar-catalog:llama-3.2-3b-instruct
  resources:
    requests:
      cpu: "1"
      memory: 8Gi
    limits:
      cpu: "4"
      memory: 20Gi

# ── hap-detector (model-serving) ──
hapDetector:
  model: ibm-granite/granite-guardian-hap-125m
  image: quay.io/trustyai/guardrails-detector-huggingface-runtime:latest
  modelPath: granite-guardian-hap-125m
  resources:
    requests:
      cpu: "1"
      memory: 4Gi
    limits:
      cpu: "2"
      memory: 8Gi

# ── prompt-injection-detector (model-serving) ──
promptInjectionDetector:
  model: protectai/deberta-v3-base-prompt-injection-v2
  image: quay.io/trustyai/guardrails-detector-huggingface-runtime:latest
  modelPath: deberta-v3-base-prompt-injection-v2
  resources:
    requests:
      cpu: "4"
      memory: 16Gi
    limits:
      cpu: "8"
      memory: 24Gi

# ── model-storage (object-storage) ──
modelStorage:
  # provider: which storage backend to use at deploy time.
  #   minio  = deploy MinIO in-cluster (default for bare metal)
  #   odf    = use OpenShift Data Foundation (requires ODF installed)
  #   s3     = use external AWS S3 or S3-compatible endpoint
  provider: minio
  bucket: data
  storage: 50Gi  # MinIO PVC size; ignored for odf and s3
  image: quay.io/trustyai/modelmesh-minio-examples:latest  # MinIO only
  endpoint: ""  # s3: e.g. https://s3.amazonaws.com; derived for minio and odf
  region: us-east-1  # s3 only
  odfStorageClass: openshift-storage.noobaa.io  # odf only

# ── guardrails (guardrails-orchestrator) ──
guardrails:
  # No user-configurable values

