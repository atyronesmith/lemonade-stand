apiVersion: apps/v1
kind: Deployment
metadata:
  name: lemonade-stand-app
  labels:
    app: lemonade-stand-app
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app: lemonade-stand-app
  template:
    metadata:
      labels:
        app: lemonade-stand-app
    spec:
      containers:
        - name: lemonade-stand-app
          image: {{ .Values.image }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: GUARDRAILS_ORCHESTRATOR_SERVICE_SERVICE_HOST
              value: {{ .Values.guardrailsHost | quote }}
            - name: GUARDRAILS_ORCHESTRATOR_SERVICE_SERVICE_PORT
              value: {{ .Values.guardrailsPort | quote }}
            - name: VLLM_MODEL
              value: {{ .Values.vllmModel | quote }}
            - name: VLLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.vllmApiKeySecret }}
                  key: {{ .Values.vllmApiKeySecretKey }}
          volumeMounts:
            - name: system-prompt
              mountPath: /system-prompt
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: {{ .Values.resources.requests.cpu | quote }}
              memory: {{ .Values.resources.requests.memory }}
            limits:
              cpu: {{ .Values.resources.limits.cpu | quote }}
              memory: {{ .Values.resources.limits.memory }}
      volumes:
        - name: system-prompt
          configMap:
            name: {{ .Values.systemPromptConfigMap }}
