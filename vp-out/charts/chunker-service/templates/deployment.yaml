apiVersion: apps/v1
kind: Deployment
metadata:
  name: chunker-service
  labels:
    app: chunker-service
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app: chunker-service
  template:
    metadata:
      labels:
        app: chunker-service
    spec:
      containers:
        - name: chunker-service
          image: {{ .Values.image }}
          ports:
            - name: grpc
              containerPort: 8085
              protocol: TCP
          resources:
            requests:
              cpu: {{ .Values.resources.requests.cpu | quote }}
              memory: {{ .Values.resources.requests.memory }}
            limits:
              cpu: {{ .Values.resources.limits.cpu | quote }}
              memory: {{ .Values.resources.limits.memory }}
